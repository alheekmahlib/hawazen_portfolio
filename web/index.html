<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Google Search Console verification -->
  <meta name="google-site-verification" content="OIn9l5KsNpj5G2Fulyl_ZjVaXNXbBsZl2HdPzXZc1YM" />

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hawazen Portfolio</title>
  <meta name="description" content="Hawazen Mahmood — Flutter developer building well-structured, maintainable apps with modern, user-friendly interfaces.">

  <!-- Theme color (mobile browser chrome) -->
  <meta name="theme-color" content="#023047">

  <!-- Fallback Open Graph / Twitter tags. The SEO pre-renderer overrides
       these per route with route-specific title/description/image; they exist
       here so a non-prerendered build still shares sensibly. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Hawazen Mahmood">
  <meta property="og:title" content="Hawazen Portfolio">
  <meta property="og:description" content="Flutter developer building well-structured, maintainable apps with modern, user-friendly interfaces.">
  <meta property="og:image" content="og-image.png">
  <meta property="og:url" content="https://hawazen.vexaltech.dev/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hawazen Portfolio">
  <meta name="twitter:description" content="Flutter developer building well-structured, maintainable apps with modern, user-friendly interfaces.">
  <meta name="twitter:image" content="og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hawazen Mahmood">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      background: #023047;
    }

    /* Keep layout stable when scrolling (prevents left-right "jump"). */
    body {
      overflow-y: scroll;
      scrollbar-gutter: stable both-edges;
    }
  </style>
</head>
<body style="overflow: hidden;">

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.onload= function(){
      setTimeout(() => {
        var loadingIndicator = document.getElementById('loading_indicator');
        if(loadingIndicator)loadingIndicator.remove()
      }, 100);
    }
  </script>
  <!--
    Accessibility fix: Flutter injects maximum-scale=1.0 / user-scalable=no at
    runtime, which blocks pinch-to-zoom (a WCAG issue and a negative Lighthouse
    / SEO signal). Restore zoom as soon as the viewport meta appears.
  -->
  <script>
    (function () {
      function allowZoom() {
        var m = document.querySelector('meta[name="viewport"]');
        if (m) {
          m.setAttribute('content', 'width=device-width, initial-scale=1.0');
        }
      }
      // Run once now and again after the DOM is ready (Flutter rewrites it).
      allowZoom();
      document.addEventListener('DOMContentLoaded', allowZoom);
      var obs = new MutationObserver(allowZoom);
      obs.observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
